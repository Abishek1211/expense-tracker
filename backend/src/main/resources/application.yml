spring:
  application:
    name: expense-tracker
  profiles:
    default: dev
  jpa:
    open-in-view: false

app:
  demo:
    # Seeds a demo account (demo@expensetracker.app) with sample data on startup.
    enabled: ${DEMO_ENABLED:true}
  cors:
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:5173}
  jwt:
    # Must be at least 32 characters; REQUIRED in prod (no default there).
    secret: ${JWT_SECRET:}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# LOG_LEVEL controls the app's own logging (access log + business logic);
# bump to DEBUG on Render when investigating a failure, no redeploy needed.
logging:
  level:
    com.abishek.expensetracker: ${LOG_LEVEL:INFO}
