spring:
  application:
    name: expense-tracker
  profiles:
    default: dev
  jpa:
    open-in-view: false

app:
  demo:
    # Seeds a demo account (demo@expensetracker.app) with sample data on startup.
    enabled: ${DEMO_ENABLED:true}
  cors:
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:5173}
  jwt:
    # Must be at least 32 characters; REQUIRED in prod (no default there).
    secret: ${JWT_SECRET:}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  google:
    # OAuth 2.0 web client ID from Google Cloud Console; Google sign-in is
    # disabled when unset.
    client-id: ${GOOGLE_CLIENT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  swagger-ui:
    path: /swagger-ui.html
