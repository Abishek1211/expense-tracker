spring:
  datasource:
    url: jdbc:h2:mem:expensedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    # Dev-only signing key for the in-memory H2 profile — never used in prod,
    # where JWT_SECRET must be provided via environment variable.
    secret: ${JWT_SECRET:dev-only-jwt-secret-not-for-production-use}
